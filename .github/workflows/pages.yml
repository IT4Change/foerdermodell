name: Deploy UI to GitHub Pages

# Veröffentlicht den statischen Ordner ui/ als GitHub-Pages-Site.
# In den Repo-Settings unter "Pages" muss als Source "GitHub Actions" gewählt sein.

on:
  push:
    branches: [master]
    paths:
      - "ui/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Minimale Rechte für das Pages-Deployment (OIDC). Kein eigener PAT/App-Token nötig.
permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deployments vermeiden; laufendes abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload ui/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
